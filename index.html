<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>私の診断アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #1da1f2; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>性格診断</h1>
        <p>ボタンを押すと結果が出るよ！</p>
        <button onclick="check()">診断スタート</button>
        <div id="result"></div>
    </div>

    <script>
        function check() {
            const results = ["熱血タイプ🔥", "クールタイプ❄️", "おっとりタイプ🍀", "不思議ちゃんタイプ👽"];
            const res = results[Math.floor(Math.random() * results.length)];
            
            document.getElementById('result').innerHTML = `<h2>結果：${res}</h2>`;
            
            // X(Twitter)へのシェアボタンを作る
            const text = encodeURIComponent(`私の性格は「${res}」でした！\n#性格診断 #GitHubPage`);
            const url = encodeURIComponent(window.location.href);
            const xUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
            
            const btn = document.createElement("button");
            btn.innerText = "Xで結果をシェアする";
            btn.onclick = () => window.open(xUrl);
            document.getElementById('result').appendChild(btn);
        }
    </script>
</body>
</html>
